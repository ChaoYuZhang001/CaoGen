name: CaoGen release candidate evidence

on:
  workflow_dispatch:
    inputs:
      commit:
        description: Full 40-character commit SHA already present on main
        required: true
        type: string
      version:
        description: Exact stable package version to validate
        required: true
        default: 0.1.7
        type: string
      platform_scope:
        description: Run macOS Intel only, both macOS lanes, or the complete macOS and Windows matrix
        required: true
        default: all
        type: choice
        options:
          - all
          - macos
          - macos-x64

permissions:
  contents: read

concurrency:
  group: caogen-release-candidate-${{ inputs.commit }}
  cancel-in-progress: false

jobs:
  candidate:
    name: Bind candidate identity
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.identity.outputs.commit }}
    steps:
      - name: Check out the exact candidate
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ inputs.commit }}
          fetch-depth: 0
          persist-credentials: false
          clean: true
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install exact dependencies
        run: npm ci
      - name: Verify candidate identity
        id: identity
        shell: bash
        env:
          CAOGEN_RELEASE_COMMIT: ${{ inputs.commit }}
          CAOGEN_RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          node scripts/release-candidate-preflight.mjs --commit "$CAOGEN_RELEASE_COMMIT" --version "$CAOGEN_RELEASE_VERSION"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Run candidate source gates
        shell: bash
        run: |
          set -euo pipefail
          npm run test:release-workflow-contract
          npm run test:product-positioning:required
          npm run typecheck
          npm run build
          npm run test:coding-standards:required
          npm run secret:scan:history

  macos-x64:
    name: macOS Intel signed candidate
    needs: candidate
    runs-on: macos-15-intel
    steps:
      - name: Check out the bound candidate
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ needs.candidate.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false
          clean: true
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          gradle-version: '8.10.2'
      - name: Install exact dependencies
        run: npm ci
      - name: Import macOS signing and notarization credentials
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID_VALUE: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_VALUE: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          for name in MACOS_CERTIFICATE_P12_BASE64 MACOS_CERTIFICATE_PASSWORD APPLE_API_KEY_P8 APPLE_API_KEY_ID_VALUE APPLE_API_ISSUER_VALUE; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Required release secret is missing: $name"
              exit 1
            fi
          done
          certificate_path="$RUNNER_TEMP/caogen-release.p12"
          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID_VALUE}.p8"
          keychain_path="$RUNNER_TEMP/caogen-release.keychain-db"
          keychain_guard="$(openssl rand -hex 32)"
          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | openssl base64 -d -A -out "$certificate_path"
          printf '%s' "$APPLE_API_KEY_P8" > "$api_key_path"
          chmod 600 "$certificate_path" "$api_key_path"
          security create-keychain -p "$keychain_guard" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_guard" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_guard" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          echo "APPLE_API_KEY=$api_key_path" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID_VALUE" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$APPLE_API_ISSUER_VALUE" >> "$GITHUB_ENV"
          echo "CAOGEN_RELEASE_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"
      - name: Run release-scope P2 gate
        env:
          CAOGEN_P2_RELEASE_IDE_BUILD_AND_VSCODE_TIMEOUT_MS: '600000'
          CAOGEN_P2_RELEASE_JETBRAINS_RECORDER_E2E_TIMEOUT_MS: '480000'
          CAOGEN_JETBRAINS_RECORDER_E2E_TIMEOUT_MS: '360000'
          CAOGEN_JETBRAINS_RECORDER_E2E_MODE: ide-script
        run: npm run test:p2-release-scope:required
      - name: Run exact-commit Deep gate
        run: npm run test:deep
      - name: Build, sign, notarize, install, and launch x64
        run: npm run dist:mac:release:x64
      - name: Upload x64 assets and evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: caogen-release-macos-x64-${{ needs.candidate.outputs.commit }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
          path: |
            dist/CaoGen-${{ inputs.version }}.dmg
            dist/CaoGen-${{ inputs.version }}.dmg.blockmap
            dist/CaoGen-${{ inputs.version }}-mac.zip
            dist/CaoGen-${{ inputs.version }}-mac.zip.blockmap
            dist/mac/CaoGen.app/Contents/Resources/app.asar
            test-results/macos-release-audit/latest-x64.json
            test-results/macos-release-audit/*/report.json
            test-results/packaged-app-smoke/latest-macos-x64.json
            test-results/packaged-app-smoke/*/report.json
            test-results/caogen-deep/latest.json
            test-results/caogen-deep/*/deep-test-report.json
            test-results/caogen-deep/*/deep-test-report.md
            test-results/p2-release-scope/latest.json
            test-results/p2-release-scope/*/report.json
      - name: Remove temporary macOS credentials
        if: always()
        shell: bash
        run: |
          set +e
          if [[ -n "${CAOGEN_RELEASE_KEYCHAIN:-}" ]]; then
            security delete-keychain "$CAOGEN_RELEASE_KEYCHAIN"
          fi
          rm -f "$RUNNER_TEMP/caogen-release.p12" "$RUNNER_TEMP"/AuthKey_*.p8

  macos-arm64:
    name: macOS Apple Silicon signed candidate
    if: "${{ inputs.platform_scope != 'macos-x64' }}"
    needs: candidate
    runs-on: macos-15-arm64
    steps:
      - name: Check out the bound candidate
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ needs.candidate.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false
          clean: true
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install exact dependencies
        run: npm ci
      - name: Import macOS signing and notarization credentials
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID_VALUE: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_VALUE: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          for name in MACOS_CERTIFICATE_P12_BASE64 MACOS_CERTIFICATE_PASSWORD APPLE_API_KEY_P8 APPLE_API_KEY_ID_VALUE APPLE_API_ISSUER_VALUE; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Required release secret is missing: $name"
              exit 1
            fi
          done
          certificate_path="$RUNNER_TEMP/caogen-release.p12"
          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID_VALUE}.p8"
          keychain_path="$RUNNER_TEMP/caogen-release.keychain-db"
          keychain_guard="$(openssl rand -hex 32)"
          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | openssl base64 -d -A -out "$certificate_path"
          printf '%s' "$APPLE_API_KEY_P8" > "$api_key_path"
          chmod 600 "$certificate_path" "$api_key_path"
          security create-keychain -p "$keychain_guard" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_guard" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_guard" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          echo "APPLE_API_KEY=$api_key_path" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID_VALUE" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$APPLE_API_ISSUER_VALUE" >> "$GITHUB_ENV"
          echo "CAOGEN_RELEASE_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"
      - name: Build, sign, notarize, install, and launch arm64
        run: npm run dist:mac:release:arm64
      - name: Upload arm64 assets and evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: caogen-release-macos-arm64-${{ needs.candidate.outputs.commit }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
          path: |
            dist/CaoGen-${{ inputs.version }}-arm64.dmg
            dist/CaoGen-${{ inputs.version }}-arm64.dmg.blockmap
            dist/CaoGen-${{ inputs.version }}-arm64-mac.zip
            dist/CaoGen-${{ inputs.version }}-arm64-mac.zip.blockmap
            test-results/macos-release-audit/latest-arm64.json
            test-results/macos-release-audit/*/report.json
            test-results/packaged-app-smoke/latest-macos-arm64.json
            test-results/packaged-app-smoke/*/report.json
      - name: Remove temporary macOS credentials
        if: always()
        shell: bash
        run: |
          set +e
          if [[ -n "${CAOGEN_RELEASE_KEYCHAIN:-}" ]]; then
            security delete-keychain "$CAOGEN_RELEASE_KEYCHAIN"
          fi
          rm -f "$RUNNER_TEMP/caogen-release.p12" "$RUNNER_TEMP"/AuthKey_*.p8

  windows-x64:
    name: Windows x64 signed candidate
    if: "${{ inputs.platform_scope == 'all' }}"
    needs: candidate
    runs-on: windows-2025
    steps:
      - name: Check out the bound candidate
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ needs.candidate.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false
          clean: true
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install exact dependencies
        run: npm ci
      - name: Materialize Windows signing credentials
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_P12_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_P12_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_P12_BASE64)) { throw 'Required release secret is missing: WINDOWS_CERTIFICATE_P12_BASE64' }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) { throw 'Required release secret is missing: WINDOWS_CERTIFICATE_PASSWORD' }
          $CertificatePath = Join-Path $env:RUNNER_TEMP 'caogen-release.p12'
          [IO.File]::WriteAllBytes($CertificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_P12_BASE64))
          "CSC_LINK=$CertificatePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CSC_KEY_PASSWORD=$($env:WINDOWS_CERTIFICATE_PASSWORD)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build, sign, install, launch, and uninstall x64
        run: npm run dist:win:release:x64
      - name: Upload Windows assets and evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: caogen-release-windows-x64-${{ needs.candidate.outputs.commit }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
          path: |
            dist/CaoGen Setup ${{ inputs.version }}.exe
            dist/CaoGen Setup ${{ inputs.version }}.exe.blockmap
            dist/latest.yml
            test-results/windows-release-audit/latest-x64.json
            test-results/windows-release-audit/*/report.json
            test-results/packaged-app-smoke/latest-windows-x64.json
            test-results/packaged-app-smoke/*/report.json
      - name: Remove temporary Windows credentials
        if: always()
        shell: pwsh
        run: Remove-Item -LiteralPath (Join-Path $env:RUNNER_TEMP 'caogen-release.p12') -Force -ErrorAction SilentlyContinue

  aggregate:
    name: Revalidate and bundle candidate evidence
    if: "${{ inputs.platform_scope == 'all' }}"
    needs: [candidate, macos-x64, macos-arm64, windows-x64]
    runs-on: ubuntu-latest
    steps:
      - name: Check out the bound candidate
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ needs.candidate.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false
          clean: true
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install exact dependencies
        run: npm ci
      - name: Download macOS x64 evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: caogen-release-macos-x64-${{ needs.candidate.outputs.commit }}
          path: test-results/release-matrix-input/macos-x64
      - name: Download macOS arm64 evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: caogen-release-macos-arm64-${{ needs.candidate.outputs.commit }}
          path: test-results/release-matrix-input/macos-arm64
      - name: Download Windows x64 evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: caogen-release-windows-x64-${{ needs.candidate.outputs.commit }}
          path: test-results/release-matrix-input/windows-x64
      - name: Assemble and independently verify the matrix
        shell: bash
        env:
          CAOGEN_RELEASE_COMMIT: ${{ needs.candidate.outputs.commit }}
          CAOGEN_RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          npm run release:matrix:assemble -- --input test-results/release-matrix-input --commit "$CAOGEN_RELEASE_COMMIT" --version "$CAOGEN_RELEASE_VERSION"
          npm run test:release-packaging-audit:required -- --version "$CAOGEN_RELEASE_VERSION"
          npm run test:product-positioning:required
          npm run test:github-release-audit:required
          npm run workos:release-doctor -- --version "$CAOGEN_RELEASE_VERSION"
          npm run test:release-notes-audit:required -- --version "$CAOGEN_RELEASE_VERSION"
          npm run workos:release-doctor -- --version "$CAOGEN_RELEASE_VERSION"
      - name: Upload the unpublished candidate bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: caogen-unpublished-candidate-${{ inputs.version }}-${{ needs.candidate.outputs.commit }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
          path: |
            dist/CaoGen-${{ inputs.version }}.dmg
            dist/CaoGen-${{ inputs.version }}.dmg.blockmap
            dist/CaoGen-${{ inputs.version }}-mac.zip
            dist/CaoGen-${{ inputs.version }}-mac.zip.blockmap
            dist/CaoGen-${{ inputs.version }}-arm64.dmg
            dist/CaoGen-${{ inputs.version }}-arm64.dmg.blockmap
            dist/CaoGen-${{ inputs.version }}-arm64-mac.zip
            dist/CaoGen-${{ inputs.version }}-arm64-mac.zip.blockmap
            dist/CaoGen Setup ${{ inputs.version }}.exe
            dist/CaoGen Setup ${{ inputs.version }}.exe.blockmap
            dist/latest-mac.yml
            dist/latest.yml
            test-results/release-matrix-assemble/latest.json
            test-results/release-packaging-audit/latest.json
            test-results/workos-release-doctor/latest.json
            test-results/macos-release-audit/latest-x64.json
            test-results/macos-release-audit/latest-arm64.json
            test-results/windows-release-audit/latest-x64.json
            test-results/packaged-app-smoke/latest-macos-x64.json
            test-results/packaged-app-smoke/latest-macos-arm64.json
            test-results/packaged-app-smoke/latest-windows-x64.json
            test-results/caogen-deep/latest.json
            test-results/p2-release-scope/latest.json
