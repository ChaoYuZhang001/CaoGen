name: CaoGen macOS Intel Office diagnostics

on:
  workflow_dispatch:
    inputs:
      commit:
        description: Full commit SHA to diagnose
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: caogen-macos-x64-office-${{ inputs.commit }}
  cancel-in-progress: true

jobs:
  office:
    name: macOS Intel Office E2E
    runs-on: macos-15-intel
    steps:
      - name: Check out the exact commit
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ inputs.commit }}
          persist-credentials: false
          clean: true
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install exact dependencies
        run: npm ci
      - name: Build CaoGen
        run: npm run build
      - name: Run Office orchestration E2E
        env:
          CAOGEN_CI_SOFTWARE_WEBGL: '1'
        run: npm run test:orchestration
      - name: Upload Office diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: caogen-macos-x64-office-${{ inputs.commit }}
          if-no-files-found: warn
          retention-days: 7
          path: test-results/orchestration-mock-e2e/**
